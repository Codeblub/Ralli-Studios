<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ralli Studios - Your Account</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <h1>Your Custom Order History</h1>
    
    <button onclick="logout()" style="padding: 5px 10px; cursor: pointer; margin-bottom: 20px;">Log Out</button>

    <div id="orders-container">Loading orders...</div>

    <div id="g_id_onload"
         data-client_id="1025926587968-flg80c3repb78hrb18vs4oqtotgaa417.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleGoogleSignIn"
         data-auto_prompt="false">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-shape="pill"
         data-theme="outline"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left">
    </div>

<script>
// SECURITY CHECK: If no account token is saved in localStorage, kick them to signin.html automatically
const userToken = localStorage.getItem("userToken");
if (!userToken) {
    window.location.href = "signin.html";
}

// Automatically runs when a user completes the Google Sign-In pop-up
async function handleGoogleSignIn(googleResponse) {
    try {
        const backendUrl = "https://reimagined-space-goggles-x5qqvgxqwp6qh67pq-3000.app.github.dev/api/auth/google";
        
        const response = await fetch(backendUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ credential: googleResponse.credential })
        });
        
        const data = await response.json();
        if (data.success) {
            localStorage.setItem("userToken", data.token);
            window.location.reload(); // Reload the page to load their orders immediately
        } else {
            alert("Google Sign-In failed: " + data.error);
        }
    } catch (err) {
        console.error("Error signing in with Google:", err);
    }
}

// Pulls orders dynamically from your custom server
async function fetchMyOrders() {
    const backendUrl = "https://reimagined-space-goggles-x5qqvgxqwp6qh67pq-3000.app.github.dev/api/orders";

    try {
        const response = await fetch(backendUrl, {
            method: "GET",
            headers: {
                "Authorization": `Bearer ${userToken}`
            }
        });

        if (response.status === 401 || response.status === 403) {
            logout(); // Kick them out if their backend session token is dead or fake
            return;
        }

        const orders = await response.json();
        const container = document.getElementById("orders-container");
        container.innerHTML = ""; // Wipe the "Loading..." message

        if (orders.length === 0) {
            container.innerHTML = "<p>You have no order history yet.</p>";
            return;
        }

        orders.forEach(order => {
            container.innerHTML += `
                <div style="border: 1px solid #000; margin: 10px; padding: 10px; max-width: 400px;">
                    <p><strong>Order ID:</strong> ${order._id}</p>
                    <p><strong>Items:</strong> ${order.items.join(", ")}</p>
                    <p><strong>Total:</strong> $${order.totalPrice}</p>
                </div>`;
        });
    } catch (err) {
        document.getElementById("orders-container").innerHTML = "Failed to load orders.";
    }
}

// Clear browser storage data and send back to sign-in page
function logout() {
    localStorage.removeItem("userToken");
    window.location.href = "signin.html";
}

// Only fetch orders if the authorization check passed
if (userToken) {
    fetchMyOrders();
}
</script>
</body>
</html>
